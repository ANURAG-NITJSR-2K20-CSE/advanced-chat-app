services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://localhost:27017", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 10s

  backend:
    build: .
    restart: unless-stopped
    ports:
      - "8080:5000"
    environment:
      NODE_ENV: development
      PORT: "5000"
      MONGO_URI: mongodb://mongo:27017/chatapp
      JWT_SECRET: local-docker-dev-only-change-me
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
